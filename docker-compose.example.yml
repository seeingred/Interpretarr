services:
  interpretarr:
    build: .
    container_name: interpretarr
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      # Mount media at the SAME path as Radarr/Sonarr reports,
      # so file paths match between services.
      - /path/to/media:/path/to/media:rw
    restart: unless-stopped
